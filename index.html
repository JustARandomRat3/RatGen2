<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>

  <style>
    :root {
      --bg: #0f0f12;
      --accent: #d4b47a;
      --muted: #a7a59c;
      --radius: 16px;
      --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --shadow: 0 12px 40px rgba(0,0,0,0.55);
      font-family: "Segoe UI", Roboto, system-ui, -apple-system, "Helvetica Neue", Arial;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(900px 500px at 8% 12%, rgba(212,180,122,0.05), transparent 60%),
        linear-gradient(180deg, #0b0b0d, #111113 60%);
      color: #e8e6e2;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- Glassmorphism Card --- */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 40px;
      width: 420px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      animation: float 6s ease-in-out infinite;
    }

    /* Floating animation */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* --- Glow Border --- */
    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(212,180,122,0.4), rgba(212,180,122,0.05));
      -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* --- Button (Glass + Neumorphic + Glow + Animation) --- */
    .animated-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 26px;
      min-width: 180px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,180,122,0.18);
      border-radius: var(--radius);
      color: var(--accent);
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition:
        background .15s ease,
        transform .15s ease,
        box-shadow .15s ease,
        border-color .15s ease;
      backdrop-filter: blur(6px);
      box-shadow:
        inset 2px 2px 6px rgba(255,255,255,0.05),
        inset -2px -2px 6px rgba(0,0,0,0.4),
        0 0 0 rgba(212,180,122,0);
    }

    .animated-btn:hover {
      background: rgba(212,180,122,0.10);
      border-color: rgba(212,180,122,0.35);
      box-shadow:
        0 0 22px rgba(212,180,122,0.35),
        inset 2px 2px 6px rgba(255,255,255,0.06),
        inset -2px -2px 6px rgba(0,0,0,0.45);
    }

    .animated-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 14px rgba(212,180,122,0.45),
        inset 2px 2px 6px rgba(255,255,255,0.04),
        inset -2px -2px 6px rgba(0,0,0,0.55);
    }

    .animated-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    p {
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="glass-card">
    <h1>This page is not operational</h1>
    <p>This page is actualy on necoties but this just exists so i decided to add a message instead of the defult 404</p>

    <button class="animated-btn" onclick="location.href='https://randomrat.neocities.org'">
      Go to the page on neocities
    </button>
  </div>
</body>
</html>
